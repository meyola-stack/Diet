<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="다이어트"><title>다이어트 체크</title><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}:root{--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--blue:#378ADD;--orange:#D85A30;--yellow:#BA7517;--bg:#F5F5F7;--card:#FFFFFF;--text:#1C1C1E;--text-sub:#8E8E93;--border:#E5E5EA;--radius:16px}body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top,44px) 16px env(safe-area-inset-bottom,20px)}.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-top:8px}.header-left h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}.header-left .date{font-size:14px;color:var(--text-sub);margin-top:2px}.weight-badge{background:var(--green);color:white;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;white-space:nowrap}.streak-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}.streak-card{background:var(--card);border-radius:var(--radius);padding:14px 12px;text-align:center}.streak-num{font-size:26px;font-weight:700;color:var(--green);letter-spacing:-1px}.streak-label{font-size:11px;color:var(--text-sub);margin-top:2px}.section-title{font-size:13px;font-weight:600;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding-left:4px}.checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}.check-item{background:var(--card);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform 0.1s,background 0.2s;border:2px solid transparent;-webkit-user-select:none;user-select:none}.check-item:active{transform:scale(0.97)}.check-item.done{background:var(--green-light);border-color:var(--green)}.check-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.check-item:not(.done) .check-icon{background:var(--bg)}.check-item.done .check-icon{background:white}.check-text​​​​​​​​​​​​​​​​
