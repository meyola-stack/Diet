<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="다이어트"><title>다이어트 체크</title><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}:root{--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--blue:#378ADD;--orange:#D85A30;--yellow:#BA7517;--bg:#F5F5F7;--card:#FFFFFF;--text:#1C1C1E;--text-sub:#8E8E93;--border:#E5E5EA;--radius:16px}body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top,44px) 16px env(safe-area-inset-bottom,20px)}.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-top:8px}.header-left h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}.header-left .date{font-size:14px;color:var(--text-sub);margin-top:2px}.weight-badge{background:var(--green);color:white;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;white-space:nowrap}.streak-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}.streak-card{background:var(--card);border-radius:var(--radius);padding:14px 12px;text-align:center}.streak-num{font-size:26px;font-weight:700;color:var(--green);letter-spacing:-1px}.streak-label{font-size:11px;color:var(--text-sub);margin-top:2px}.section-title{font-size:13px;font-weight:600;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding-left:4px}.checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}.check-item{background:var(--card);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform 0.1s,background 0.2s;border:2px solid transparent;-webkit-user-select:none;user-select:none}.check-item:active{transform:scale(0.97)}.check-item.done{background:var(--green-light);border-color:var(--green)}.check-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.check-item:not(.done) .check-icon{background:var(--bg)}.check-item.done .check-icon{background:white}.check-text{flex:1}.check-title{font-size:15px;font-weight:600}.check-sub{font-size:12px;color:var(--text-sub);margin-top:2px}.check-item.done .check-sub{color:var(--green-dark)}.check-box{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}.check-item.done .check-box{background:var(--green);border-color:var(--green);color:white;font-size:14px}.cal-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px}.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.cal-nav-btn{background:var(--bg);border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer;color:var(--text)}.cal-month{font-size:16px;font-weight:600}.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}.cal-wd{text-align:center;font-size:11px;color:var(--text-sub);padding:4px 0;font-weight:500}.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}.cal-day.empty{cursor:default}.cal-day.today{background:#EEF4FF;outline:2px solid var(--blue)}.cal-day.today .cal-dn{color:var(--blue);font-weight:700}.cal-day.selected{background:#E1F5EE;outline:2px solid var(--green)}.cal-dn{font-size:13px;color:var(--text)}.cal-dots{display:flex;gap:2px;margin-top:2px;height:6px;align-items:center}.dot{width:5px;height:5px;border-radius:50%}.legend{display:flex;flex-wrap:wrap;gap:10px;padding:0 4px;margin-bottom:16px}.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sub)}.goal-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px}.goal-header{display:flex;justify-content:space-between;margin-bottom:10px}.goal-title{font-size:14px;font-weight:600}.goal-kg{font-size:14px;color:var(--green);font-weight:700}.progress-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#34D399);border-radius:4px;transition:width 0.5s ease}.goal-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-sub)}.d0{background:var(--green)}.d1{background:var(--blue)}.d2{background:var(--orange)}.d3{background:var(--yellow)}.selected-date-label{font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px;padding-left:4px}.past-note{font-size:11px;color:var(--text-sub);margin-bottom:8px;padding-left:4px}</style></head><body><div class="header"><div class="header-left"><h1>다이어트 체크 💪</h1><div class="date" id="dateLabel"></div></div><div class="weight-badge">목표 -11kg</div></div><div class="streak-row"><div class="streak-card"><div class="streak-num" id="streakNum">0</div><div class="streak-label">연속 실천일</div></div><div class="streak-card"><div class="streak-num" id="totalNum">0</div><div class="streak-label">총 실천일</div></div><div class="streak-card"><div class="streak-num" id="todayNum">0/4</div><div class="streak-label">오늘 달성</div></div></div><div class="goal-card"><div class="goal-header"><div class="goal-title">89kg → 78kg 목표</div><div class="goal-kg" id="goalKg">89kg</div></div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div class="goal-labels"><span>시작 89kg</span><span>목표 78kg</span></div></div><div class="selected-date-label" id="selectedDateLabel">오늘 체크</div><div class="past-note" id="pastNote" style="display:none">📅 과거 날짜 — 수정 가능해요</div><div class="checklist" id="checklist"></div><div class="cal-card"><div class="cal-nav"><button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button><div class="cal-month" id="calMonth"></div><button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button></div><div class="cal-weekdays"><div class="cal-wd" style="color:#FF3B30">일</div><div class="cal-wd">월</div><div class="cal-wd">화</div><div class="cal-wd">수</div><div class="cal-wd">목</div><div class="cal-wd">금</div><div class="cal-wd" style="color:#007AFF">토</div></div><div class="cal-days" id="calDays"></div></div><div class="legend"><div class="legend-item"><div class="dot d0"></div> 간헐적단식</div><div class="legend-item"><div class="dot d1"></div> 운동</div><div class="legend-item"><div class="dot d2"></div> 디저트조절</div><div class="legend-item"><div class="dot d3"></div> 산책</div></div><script>const ITEMS=[{id:0,icon:'⏰',title:'간헐적단식',sub:'밤 7시 ~ 오전 11:30',dotClass:'d0'},{id:1,icon:'🏃',title:'운동',sub:'주 3회 목표',dotClass:'d1'},{id:2,icon:'🍪',title:'디저트 조절',sub:'하루 걸러',dotClass:'d2'},{id:3,icon:'🚶',title:'산책',sub:'가볍게라도 OK',dotClass:'d3'}];const KEY='diet_v2';let data={};try{const s=localStorage.getItem(KEY);if(s)data=JSON.parse(s);}catch(e){}const now=new Date();let viewYear=now.getFullYear();let viewMonth=now.getMonth();let selectedKey=now.getFullYear()+'-'+now.getMonth()+'-'+now.getDate();function todayKey(){return now.getFullYear()+'-'+now.getMonth()+'-'+now.getDate();}function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}function toggle(id){const arr=data[selectedKey]||[];const idx=arr.indexOf(id);if(idx>=0)arr.splice(idx,1);else arr.push(id);data[selectedKey]=arr;save();render();}function calcStreak(){let streak=0;let d=new Date(now);for(let i=0;i<365;i++){const k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();const arr=data[k]||[];if(arr.length===0&&i>0)break;if(arr.length>0)streak++;d.setDate(d.getDate()-1);}return streak;}function calcTotal(){return Object.values(data).filter(a=>a&&a.length>0).length;}function setDate(){const days=['일','월','화','수','목','금','토'];const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];document.getElementById('dateLabel').textContent=now.getFullYear()+'년 '+months[now.getMonth()]+' '+now.getDate()+'일 ('+days[now.getDay()]+')';}function render(){setDate();const checked=data[selectedKey]||[];const tk=todayKey();const isToday=selectedKey===tk;const parts=selectedKey.split('-');const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];const days=['일','월','화','수','목','금','토'];const sd=new Date(parseInt(parts[0]),parseInt(parts[1]),parseInt(parts[2]));document.getElementById('selectedDateLabel').textContent=isToday?'오늘 체크':parts[0]+'년 '+months[parseInt(parts[1])]+' '+parseInt(parts[2])+'일 ('+days[sd.getDay()]+') 체크';document.getElementById('pastNote').style.display=isToday?'none':'block';document.getElementById('checklist').innerHTML=ITEMS.map(item=>'<div class="check-item '+(checked.includes(item.id)?'done':'')+'" onclick="toggle('+item.id+')"><div class="check-icon">'+item.icon+'</div><div class="check-text"><div class="check-title">'+item.title+'</div><div class="check-sub">'+item.sub+'</div></div><div class="check-box">'+(checked.includes(item.id)?'✓':'')+'</div></div>').join('');document.getElementById('streakNum').textContent=calcStreak();document.getElementById('totalNum').textContent=calcTotal();document.getElementById('todayNum').textContent=(data[tk]||[]).length+'/4';const totalDays=calcTotal();const estimatedLoss=Math.min(totalDays*0.05,11);const pct=(estimatedLoss/11)
